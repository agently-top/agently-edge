# Hello World Agent 配置文件
# 这是一个简单的示例 Agent，展示如何使用 agently Edge Runtime

agent:
  id: hello-world
  name: Hello World Agent
  version: 0.1.0
  description: "A friendly hello world assistant"

runtime:
  # 模型路径（需要根据实际部署位置修改）
  model_path: ./models/qwen2.5-0.5b-instruct-q4_k_m.gguf
  # 上下文长度
  context_length: 4096
  # 生成温度（0.0-1.0，越高越随机）
  temperature: 0.7
  # 最大生成 token 数
  max_tokens: 512
  # 推理线程数
  n_threads: 4

# Prompt 配置
prompts:
  # 系统提示词
  system: |
    You are a friendly hello world assistant.
    Your purpose is to greet users and help them get started with agently Edge.
    Be concise, warm, and helpful.
  
  # 欢迎语
  welcome: |
    👋 Hello! I'm your Hello World Agent.
    I'm running on agently Edge Runtime.
    How can I help you today?

# 日志配置
logging:
  level: info  # debug, info, warn, error
  format: pretty  # pretty, json
